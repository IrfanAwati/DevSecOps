name: Checkov Terraform Dummy Scan

on:
  workflow_dispatch:
  push:
    paths:
      - 'checkov/terraform-dummy/**'
  pull_request:
    paths:
      - 'checkov/terraform-dummy/**'

jobs:
  checkov:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov on terraform-dummy module
        run: |
          checkov -d ./checkov/terraform-dummy --framework terraform \
            --compact \
            --output cli \
            --output-file-path checkov-terraform-dummy-report.json

      - name: Upload Checkov SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform-dummy-report.json
          category: 'checkov-terraform-dummy'

      - name: Upload Checkov report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-terraform-dummy-report
          path: checkov-terraform-dummy-report.json
          retention-days: 7

      - name: Fail on failed checks
        if: failure()
        run: |
          echo "Checkov found issues in checkov/terraform-dummy. Fix them before merging."
          exit 1
