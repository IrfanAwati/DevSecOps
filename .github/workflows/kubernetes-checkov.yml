name: Kubernetes Security Scan with Checkov

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checkov-kubernetes:
    name: Checkov Kubernetes Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov on Kubernetes manifests
        id: checkov
        run: |
          checkov -d ./checkov/kubernetes-dummy \
            --framework kubernetes \
            --compact \
            --output cli \
            --output sarif \
            --output-file-path checkov-kubernetes-report.sarif
            --summary-position bottom

      - name: Upload Checkov SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-kubernetes-report.sarif
          category: 'checkov-kubernetes'

      - name: Upload Checkov report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-kubernetes-report
          path: checkov-kubernetes-report.sarif
          retention-days: 7

      - name: Fail if critical issues found
        if: failure()
        run: |
          echo "Checkov found security issues in Kubernetes manifests. Review and fix before merging."
          exit 1
