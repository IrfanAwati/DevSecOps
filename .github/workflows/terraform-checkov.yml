name: Terraform Security Scan with Checkov

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checkov-scan:
    name: Checkov Terraform Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov on Terraform
        id: checkov
        run: |
          checkov -d ./checkov/terraform-dummy \
            --framework terraform \
            --compact \
            --output cli \
            --output sarif \
            --output-file-path checkov-terraform-report.sarif
            --summary-postion bottom

      - name: Upload Checkov SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-terraform-report.sarif
          category: 'checkov-terraform'

      - name: Upload Checkov report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-terraform-report
          path: checkov-terraform-report.sarif
          retention-days: 7

      - name: Fail if critical issues found
        if: failure() && steps.checkov.outcome != 'success'
        run: |
          echo "Checkov found security issues. Review the report and fix them before merging."
          exit 1
